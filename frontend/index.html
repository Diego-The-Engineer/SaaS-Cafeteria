<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Séptima Café - Punto de Venta</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <h1>Menú de la Cafetería</h1>
        <p>Pide en línea y recoge en mostrador</p>
    </div>

    <div class="menu-container" id="menu-contenedor">
    </div>

    <div class="carrito-container">
        <h2>Tu Pedido</h2>
        <div id="lista-carrito">
            <p style="color: var(--text-muted); font-size: 14px;">El carrito está vacío.</p>
        </div>
        
        <div class="total-container">
            <span>Total</span>
            <span id="total-precio">$0.00</span>
        </div>

        <button class="btn-checkout" id="btn-enviar" onclick="enviarPedido()" disabled>
            Confirmar Pedido
        </button>
    </div>

    <script src="app.js"></script>
</body>
</html>
