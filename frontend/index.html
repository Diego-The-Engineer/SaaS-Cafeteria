<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Séptima Café - Punto de Venta</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="header">
        <h1>Menú de la Cafetería</h1>
        <p>Pide en línea y recoge en mostrador</p>
    </div>

    <div class="menu-container" id="menu-contenedor">
    </div>

    <div class="carrito-container">
        <h2>Tu Pedido</h2>
        <div id="lista-carrito">
            <p style="color: var(--text-muted); font-size: 14px;">El carrito está vacío.</p>
        </div>
        
        <div class="total-container">
            <span>Total</span>
            <span id="total-precio">$0.00</span>
        </div>

        <button type= "button" class="btn btn-primary w-100" id="btn-enviar" data-bs-toggle="modal" data-bs-target="#staticBackdrop" disabled>
            Confirmar Pedido
        </button>
    </div>
    <div class="modal fade" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="staticBackdropLabel">Completa tu Pedido</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      
      <div class="modal-body">
        <form id="form-checkout">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="cliente-nombre" class="form-label">Nombre</label>
                    <input type="text" class="form-control" id="cliente-nombre" placeholder="Ej. Moises" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="cliente-apellido" class="form-label">Apellido</label>
                    <input type="text" class="form-control" id="cliente-apellido" placeholder="Ej. Garcia" required>
                </div>
            </div>
            
            <div class="mb-3">
                <label for="cliente-email" class="form-label">Correo Electrónico</label>
                <input type="email" class="form-control" id="cliente-email" placeholder="a.cruz@ejemplo.com" required>
            </div>
            
            <div class="mb-3">
                <label for="cliente-telefono" class="form-label">Teléfono</label>
                <input type="tel" class="form-control" id="cliente-telefono" placeholder="9341024062" required>
            </div>
            
            <hr class="my-4">
            
            <div class="mb-3">
                <label for="tarjeta-token" class="form-label text-muted">Token de Tarjeta (Entorno Sandbox)</label>
                <input type="text" class="form-control border-warning" id="tarjeta-token" placeholder="tok_sandbox_12345" required>
            </div>
        </form>
      </div>
      
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary" onclick="procesarPago()">Confirmar y Pagar</button>
      </div>
    </div>
  </div>
</div>
    <script src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
