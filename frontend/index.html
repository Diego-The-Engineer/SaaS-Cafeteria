<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Séptima Café - Punto de Venta</title>
    <!-- Conexión al archivo CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <div class="loader-wrapper">
            <div class="cup-container">
                <div class="steam steam-1"></div>
                <div class="steam steam-2"></div>
                <div class="steam steam-3"></div>
                <div class="coffee-cup"></div>
            </div>
        </div>
        <h1>Menú de la Cafetería</h1>
        <p>Pide en línea y recoge en mostrador</p>
    </div>

    <!-- Contenedor del menú -->
    <div class="menu-container" id="menu-contenedor">
        <p style="text-align: center; width: 100%; color: var(--text-muted);">Conectando con el servidor...</p>
    </div>

    <!-- Panel Lateral del Carrito -->
    <div class="carrito-container">
        <h2>Tu Pedido</h2>
        <div id="lista-carrito">
            <p style="color: var(--text-muted); font-size: 14px;">El carrito está vacío.</p>
        </div>
        
        <div class="total-container">
            <span>Total</span>
            <span id="total-precio">$0.00</span>
        </div>

        <button class="btn-checkout" id="btn-enviar" onclick="enviarPedido()" disabled>
            Confirmar Pedido
        </button>
    </div>

    <!-- Conexión al archivo JavaScript -->
    <script src="app.js"></script>
</body>
</html>
