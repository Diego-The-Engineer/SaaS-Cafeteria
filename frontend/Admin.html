<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Cafetería</title>
    <style>
        :root {
            --primary: #2962ff;
            --bg-color: #f4f7f6;
            --text-dark: #2c3e50;
            --text-muted: #7f8c8d;
            --card-bg: #ffffff;
            --danger: #e74c3c;
            --success: #2ecc71;
            --warning: #f1c40f;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 30px;
            color: var(--text-dark);
        }

        .header {
            display: flex; justify-content: space-between; align-items: baseline;
            margin-bottom: 30px; max-width: 1200px; margin-left: auto; margin-right: auto;
        }

        .header h1 { margin: 0; font-size: 28px; }
        .header button {
            background: none; border: 1px solid var(--danger); color: var(--danger);
            padding: 8px 15px; border-radius: 5px; cursor: pointer; transition: 0.3s;
        }
        .header button:hover { background: var(--danger); color: white; }

        .card {
            background: var(--card-bg); border-radius: 12px; padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); max-width: 1200px; margin: 0 auto 25px auto;
        }

        h2 { margin-top: 0; font-size: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 20px;}

        /* --- FORMULARIOS --- */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px;}
        .form-group input {
            width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;
        }
        
        .btn-primary {
            background-color: var(--primary); color: white; border: none; padding: 12px 20px;
            border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .btn-primary:hover { background-color: #1e4cd9; }

        /* --- TABLA --- */
        .tabla-contenedor { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #f8faff; color: var(--text-muted); font-size: 14px;}
        
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .badge.stock-ok { background: #e8f8f5; color: var(--success); }
        .badge.stock-low { background: #fdedec; color: var(--danger); }
        .badge.stock-hidden { background: #f2f3f4; color: var(--text-muted); border: 1px solid #ddd; }

        /* --- BOTONES DE ACCIÓN EN TABLA --- */
        .btn-accion {
            padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; 
            font-size: 12px; font-weight: bold; margin-right: 5px; transition: 0.2s;
        }
        .btn-toggle { background: var(--warning); color: #333; }
        .btn-toggle:hover { background: #d4ac0d; color: white; }
        .btn-delete { background: var(--danger); color: white; }
        .btn-delete:hover { background: #c0392b; }

        @media (max-width: 768px) {
            body { padding: 15px; }
            .header { flex-direction: column; text-align: center; gap: 15px; }
            .card { padding: 15px; }
            table { white-space: nowrap; }
            .btn-primary, input { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="header" id="admin-header" style="display:none;">
        <div>
            <h1>Dashboard Administrativo</h1>
        </div>
        <button onclick="cerrarSesion()">Cerrar Sesión</button>
    </div>

    <div class="card" id="login-section" style="max-width: 400px; margin-top: 50px;">
        <h2>Iniciar Sesión</h2>
        <div class="form-group">
            <label>Usuario</label>
            <input type="text" id="username" placeholder="admin">
        </div>
        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" id="password" placeholder="***">
        </div>
        <button class="btn-primary" style="width: 100%;" onclick="login()">Entrar</button>
        <p id="login-error" style="color: red; font-size: 14px; text-align: center; display: none;">Credenciales incorrectas</p>
    </div>

    <div id="admin-panel" style="display:none;">
        
        <div class="card">
            <h2>Agregar Nuevo Producto</h2>
            <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                <div class="form-group" style="flex: 1; min-width: 200px;">
                    <label>Nombre del Producto</label>
                    <input type="text" id="prod-nombre" placeholder="Ej. Frappé">
                </div>
                <div class="form-group" style="flex: 1; min-width: 100px;">
                    <label>Precio ($)</label>
                    <input type="number" id="prod-precio" placeholder="0.00">
                </div>
                <div class="form-group" style="flex: 1; min-width: 100px;">
                    <label>Cantidad (Stock)</label>
                    <input type="number" id="prod-cantidad" placeholder="0">
                </div>
            </div>
            <button class="btn-primary" onclick="agregarProducto()">Guardar Producto</button>
        </div>

        <div class="card">
            <h2>Inventario Actual</h2>
            <div class="tabla-contenedor">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Precio</th>
                            <th>Stock</th>
                            <th>Estado</th>
                            <th>Acciones</th> </tr>
                    </thead>
                    <tbody id="tabla-productos">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "http://192.168.56.101:8010";

        window.onload = () => {
            const token = localStorage.getItem("token");
            if(token) {
                mostrarPanel();
                cargarInventario();
            }
        };

        async function login() {
            const user = document.getElementById("username").value;
            const pass = document.getElementById("password").value;
            const errorMsg = document.getElementById("login-error");

            const formData = new URLSearchParams();
            formData.append("username", user);
            formData.append("password", pass);

            try {
                const res = await fetch(`${API_URL}/token`, {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: formData
                });

                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem("token", data.access_token);
                    errorMsg.style.display = "none";
                    mostrarPanel();
                    cargarInventario();
                } else {
                    errorMsg.style.display = "block";
                }
            } catch (error) {
                alert("Error de red conectando al servidor");
            }
        }

        function cerrarSesion() {
            localStorage.removeItem("token");
            document.getElementById("admin-panel").style.display = "none";
            document.getElementById("admin-header").style.display = "none";
            document.getElementById("login-section").style.display = "block";
        }

        function mostrarPanel() {
            document.getElementById("login-section").style.display = "none";
            document.getElementById("admin-header").style.display = "flex";
            document.getElementById("admin-panel").style.display = "block";
        }

        async function cargarInventario() {
            const token = localStorage.getItem("token");
            try {
                const res = await fetch(`${API_URL}/sus_productos`, {
                    headers: { "Authorization": `Bearer ${token}` }
                });

                if (res.status === 401) { cerrarSesion(); return; }

                const productos = await res.json();
                const tbody = document.getElementById("tabla-productos");
                tbody.innerHTML = "";

                productos.forEach(p => {
                    const stock = p.cantidad !== undefined ? p.cantidad : 0;
                    
                    // Lógica visual del estado
                    let estadoHtml = '';
                    if (!p.disponible) {
                        estadoHtml = '<span class="badge stock-hidden">Oculto</span>';
                    } else if (stock > 5) {
                        estadoHtml = '<span class="badge stock-ok">Suficiente</span>';
                    } else {
                        estadoHtml = '<span class="badge stock-low">Bajo Stock</span>';
                    }
                    
                    tbody.innerHTML += `
                        <tr>
                            <td style="color:#7f8c8d; font-size:12px;">${p.id || 'N/A'}</td>
                            <td style="font-weight:bold;">${p.nombre}</td>
                            <td>$${p.precio_unitario}</td>
                            <td>${stock}</td>
                            <td>${estadoHtml}</td>
                            <td>
                                <button class="btn-accion btn-toggle" onclick="toggleDisponibilidad('${p.id}', ${p.disponible}, '${p.nombre}', ${p.precio_unitario}, ${stock})">
                                    ${p.disponible ? 'Ocultar' : 'Activar'}
                                </button>
                                <button class="btn-accion btn-delete" onclick="eliminarProducto('${p.id}')">Borrar</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) { console.error("Error al cargar inventario", error); }
        }

        async function agregarProducto() {
            const nombre = document.getElementById("prod-nombre").value;
            const precio = parseFloat(document.getElementById("prod-precio").value);
            const cantidad = parseInt(document.getElementById("prod-cantidad").value);
            const token = localStorage.getItem("token");

            if(!nombre || isNaN(precio) || isNaN(cantidad)) {
                alert("Por favor llena todos los campos.");
                return;
            }

            const payload = { nombre: nombre, precio_unitario: precio, cantidad: cantidad, disponible: true };

            try {
                const res = await fetch(`${API_URL}/productos`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
                    body: JSON.stringify(payload)
                });

                if(res.ok) {
                    document.getElementById("prod-nombre").value = "";
                    document.getElementById("prod-precio").value = "";
                    document.getElementById("prod-cantidad").value = "";
                    cargarInventario();
                } else { alert("Error al guardar"); }
            } catch (error) { alert("Error de conexión"); }
        }

        // --- FUNCIONES RESTAURADAS ---
        async function eliminarProducto(id) {
            if(!confirm("¿Seguro que quieres eliminar este producto para siempre?")) return;
            const token = localStorage.getItem("token");
            try {
                const res = await fetch(`${API_URL}/productos/${id}`, {
                    method: "DELETE",
                    headers: { "Authorization": `Bearer ${token}` }
                });
                if(res.ok) {
                    cargarInventario();
                } else { alert("Error al eliminar el producto de la base de datos."); }
            } catch(e) { alert("Error de red"); }
        }

        async function toggleDisponibilidad(id, estadoActual, nombre, precio, stock) {
            const token = localStorage.getItem("token");
            // Se hace un PUT mandando el objeto completo pero con el "disponible" invertido
            const payload = { 
                nombre: nombre, 
                precio_unitario: precio, 
                cantidad: stock, 
                disponible: !estadoActual 
            };

            try {
                const res = await fetch(`${API_URL}/productos/${id}`, {
                    method: "PUT",
                    headers: { 
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}` 
                    },
                    body: JSON.stringify(payload)
                });
                if(res.ok) {
                    cargarInventario();
                } else { alert("Error al cambiar la disponibilidad."); }
            } catch(e) { alert("Error de red"); }
        }
    </script>
</body>
</html>
